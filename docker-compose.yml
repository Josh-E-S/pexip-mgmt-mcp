# Run the Pexip MCP server over the streamable-HTTP transport as a long-running
# service — point your own reverse proxy / Cloudflare Tunnel at 127.0.0.1:8000.
#
# For stdio use (Claude Desktop launching the process directly), you don't need
# compose — run `uvx pexip-mgmt-mcp` or the image directly.
#
# Before `docker compose up`: copy .env.example to .env and fill it in. Because
# the container binds 0.0.0.0 internally, PEXIP_MCP_TOKEN MUST be set in .env or
# the server refuses to start (the guardrail against an unauthenticated bind).
services:
  pexip-mgmt-mcp:
    build: .
    image: ghcr.io/josh-e-s/pexip-mgmt-mcp:latest
    restart: unless-stopped
    # Host-side bind stays on loopback; expose it only through your tunnel/proxy.
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    healthcheck:
      # Reuses the built-in connectivity probe against your Management Node.
      test: ["CMD", "python", "-m", "pexip_mcp", "--healthcheck"]
      interval: 1m
      timeout: 15s
      retries: 3
      start_period: 10s
