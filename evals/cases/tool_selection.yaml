# --- Status API ---

- id: active-conferences
  prompt: "Are there any meetings happening right now?"
  expected_tools: [list_active_conferences]
  match: exact
  tags: [status, single-step]

- id: active-participants
  prompt: "Who is in the AllHands meeting right now?"
  expected_tools: [list_active_participants]
  match: exact
  tags: [status, single-step]

- id: participant-quality
  prompt: "How is Bob's call quality right now?"
  expected_tools: [get_participant_quality]
  # subset: get_participant_quality resolves the display name itself, but
  # finding Bob via list_active_participants first is also legitimate.
  match: subset
  mock_returns:
    list_active_participants:
      objects:
        - {id: "part-uuid-bob", display_name: "Bob", role: "chair", conference: "Standup"}
      meta: {total_count: 1}
  tags: [status, single-step]

- id: alarms
  prompt: "Are there any active alarms on the platform?"
