# --- Multi-step tool selection ---

- id: kick-alice
  prompt: "Kick Alice from the standup meeting"
  # The server resolves the participant NAME -> UUID, so disconnecting "Alice"
  # is a single call — no need to list participants first. subset still passes
  # if the model also lists defensively.
  expected_tools:
    - disconnect_participant
  match: subset
  mock_returns:
    list_active_participants:
      objects:
        - {id: "part-uuid-alice", display_name: "Alice", role: "guest", conference: "Standup"}
      meta: {total_count: 1}
  tags: [command, single-step]

- id: create-vmr-with-alias
  prompt: "Create a VMR called 'Board Meeting' with host PIN 123456 and add the alias board@company.com"
  expected_tools:
    - create_vmr
  match: subset
  tags: [config, multi-step]

- id: vmr-lifecycle-check
  prompt: "Check if the TestRoom VMR exists, if not create it"
  # any_of: listing with a name filter and fetching by name are equally valid
  # existence checks — either proves the model checked before creating.
  expected_tools:
    - list_vmrs
    - get_vmr
  match: any_of
  tags: [config, multi-step]

# ===========================================================================
# Persona: Live meeting operator — day-to-day, in-call moderation
# ===========================================================================

- id: unmute-participant
  prompt: "Unmute participant abc-123"
  expected_tools: [unmute_participant]
  match: exact
  tags: [command, operator, single-step]

- id: unlock-conference
  prompt: "Unlock conference def-456 so people can join again"
  expected_tools: [unlock_conference]
  match: exact
  tags: [command, operator, single-step]

- id: mute-all-guests
  prompt: "Mute all the guests in conference def-456, leave the hosts alone"
  expected_tools: [mute_guests]
  match: exact
  tags: [command, operator, single-step]

- id: unmute-all-guests
  prompt: "Let the guests talk again in conference def-456"
  expected_tools: [unmute_guests]
  match: exact
  tags: [command, operator, single-step]

- id: promote-to-host
  prompt: "Promote participant xyz-789 to host"
  expected_tools: [set_participant_role]
  match: exact
  tags: [command, operator, single-step]

- id: admit-from-lobby
  prompt: "Admit participant abc-123 who's waiting in the lobby"
  expected_tools: [unlock_participant]
  match: exact
  tags: [command, operator, single-step]

- id: change-layout-guest
  prompt: "Switch the guest view in conference def-456 to nine equal tiles"
  expected_tools: [set_conference_layout]
  match: exact
  tags: [command, operator, single-step]

- id: whos-muted
  prompt: "Who is currently muted in the AllHands meeting?"
  expected_tools: [list_active_participants]
  match: exact
  tags: [status, operator, single-step]

- id: end-the-meeting
  prompt: "End the standup meeting right now, drop everyone"
  # The server resolves the conference name itself, so disconnecting directly
  # is ideal; listing first (before a destructive command) is also fine —
  # the mock lets that path reach the disconnect.
  expected_tools:
    - disconnect_conference
  match: subset
  mock_returns:
    list_active_conferences:
      objects:
        - {id: "conf-uuid-standup", name: "Standup", service_type: "conference"}
      meta: {total_count: 1}
  tags: [command, operator, multi-step, destructive]

