# Persona: Dial plan / routing administrator (incl. settings-dict resources)
# ===========================================================================

- id: disable-gateway-rule
  prompt: "Disable the gateway rule called 'PSTN Breakout' for now"
  expected_tools: [update_gateway_rule]
  match: exact
  tags: [config, routing, single-step]

- id: delete-gateway-rule
  prompt: "Delete the gateway rule named 'Old Teams Route'"
  expected_tools: [delete_gateway_rule]
  match: exact
  tags: [config, routing, single-step]

- id: list-teams-connectors
  prompt: "Show me the configured Microsoft Teams Connectors"
  expected_tools: [list_resources]
  match: exact
  tags: [config, routing, integrations, single-step]

- id: list-policy-profiles
  prompt: "List the external policy profiles"
  expected_tools: [list_resources]
  match: exact
  tags: [config, routing, single-step]

- id: add-dns-server
  prompt: "Add a DNS server at 10.0.0.53"
  expected_tools: [create_resource]
  # subset: checking the schema before a create is the documented protocol for
  # the generic CRUD tools — what matters is that the create happens.
  match: subset
  mock_returns:
    get_resource_schema:
      fields:
        address: {type: "string", nullable: false, help_text: "IP address of the DNS server"}
        description: {type: "string", nullable: true, help_text: "Optional description"}
  tags: [config, infrastructure, single-step]

- id: update-syslog-server
  prompt: "Point the syslog server named 'central-log' at 10.0.0.99 instead"
  expected_tools: [update_resource]
  # subset: update_resource resolves the name itself, but looking the server up
  # first is legitimate read-before-write behavior.
  match: subset
  mock_returns:
    list_resources:
      objects:
        - {id: 3, name: "central-log", address: "10.0.0.50", port: 514}
      meta: {total_count: 1}
    get_resource:
      {id: 3, name: "central-log", address: "10.0.0.50", port: 514}
    get_resource_schema:
      fields:
        name: {type: "string", nullable: false}
        address: {type: "string", nullable: false, help_text: "Syslog server address"}
        port: {type: "integer", nullable: false}
  tags: [config, infrastructure, single-step]

