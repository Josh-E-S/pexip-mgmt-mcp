- id: summarize-invalid-group-by
  prompt: "Summarize calls grouped by an invalid field"
  tool: summarize_calls
  tool_params:
    start_time: "2026-01-01T00:00:00"
    end_time: "2026-01-02T00:00:00"
    group_by: "invalid_field"
  mock_sequence: []
  expect_error:
    type: PexipError
    status: 400
  tags: [history, error, validation]

