# Error handling eval cases
# Tests that the agent handles API errors gracefully — surfacing useful
# messages instead of crashing or retrying blindly.

- id: vmr-not-found
  prompt: "Get the VMR called nonexistent-room-xyz"
  tool: get_vmr
  tool_params: {vmr: "nonexistent-room-xyz"}
  mock_sequence:
    - method: GET
      url_suffix: /conference/
      status: 200
      body:
        meta: {total_count: 0, limit: 2, offset: 0}
        objects: []
  expect_error:
    type: PexipError
    status: 404
  tags: [config, error]

- id: vmr-ambiguous-name
  prompt: "Get the VMR called Meeting"
  tool: get_vmr
  tool_params: {vmr: "Meeting"}
  mock_sequence:
    - method: GET
      url_suffix: /conference/
      status: 200
      body:
        meta: {total_count: 2, limit: 2, offset: 0}
        objects:
          - {id: 1, name: "Meeting", resource_uri: "/api/admin/configuration/v1/conference/1/"}
          - {id: 2, name: "Meeting", resource_uri: "/api/admin/configuration/v1/conference/2/"}
  expect_error:
    type: PexipError
    status: 409
  tags: [config, error]

- id: update-vmr-no-fields
  prompt: "Update the VMR with id 5 but don't change anything"
  tool: update_vmr
  tool_params: {vmr: 5}
  mock_sequence: []
  expect_error:
    type: PexipError
    status: 400
  tags: [config, error]

- id: delete-nonexistent-vmr
  prompt: "Delete VMR with id 99999"
  tool: delete_vmr
  tool_params: {vmr: 99999}
  mock_sequence:
    - method: DELETE
      url_suffix: /conference/99999/
      status: 404
      body: {error: "Not found"}
  expect_error:
    type: PexipError
    status: 404
  tags: [config, error]

- id: disconnect-already-gone
  prompt: "Disconnect participant that already left"
  tool: disconnect_participant
  tool_params: {participant_id: "99999999-aaaa-bbbb-cccc-dddddddddddd"}
  mock_sequence:
    - method: POST
      url_suffix: /participant/disconnect/
      status: 404
      body: {error: "Participant not found"}
  expect_success:
    key: note
    value: "already disconnected"
  tags: [command, error, idempotent]

- id: disconnect-conference-already-ended
  prompt: "Disconnect everyone from a conference that already ended"
  tool: disconnect_conference
  tool_params: {conference_id: "cccccccc-1111-2222-3333-444444444444"}
  mock_sequence:
    - method: POST
      url_suffix: /conference/disconnect/
      status: 404
      body: {error: "Conference not found"}
  expect_success:
    key: note
    value: "conference already ended"
  tags: [command, error, idempotent]

