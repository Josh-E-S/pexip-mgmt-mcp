  prompt: "Set participant abc-123 to role 'moderator'"
  tool: set_participant_role
  tool_params: {participant_id: "88888888-aaaa-bbbb-cccc-eeeeeeeeeeee", role: "moderator"}
  mock_sequence: []
  expect_error:
    type: PexipError
